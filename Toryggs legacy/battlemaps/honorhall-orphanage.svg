<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif" role="img">
<title>Honorhall Orphanage — Orion's solo infiltration</title>
<desc>Two-floor stealth floorplan of Honorhall. Ground floor: canal-side kitchen entry, main hall with the staircase, the dormitory field-of-sleepers, the cellar. Upper floor: Grelod's quarters (the target, light sleeper), the training room (evidence, master lock), storage. No guards — the 23 conditioned children are the alarm.</desc>

<!-- background -->
<rect x="0" y="0" width="1200" height="800" fill="#15120e"/>
<text x="40" y="34" fill="#d8c79a" font-size="22" letter-spacing="2">HONORHALL ORPHANAGE — ORION SOLO · "be seen by no one"</text>
<text x="40" y="54" fill="#8a7a54" font-size="12.5" font-style="italic">No guards. 23 conditioned children ARE the alarm. Detection doesn't summon — it DETONATES. Run the dormitory as a field of fuses, not one roll.</text>

<!-- ===================== GROUND FLOOR ===================== -->
<text x="60" y="86" fill="#b9a878" font-size="15" letter-spacing="2">GROUND FLOOR (public)</text>

<!-- canal strip -->
<rect x="40" y="96" width="34" height="624" fill="#23485a" stroke="#3f6e86" stroke-width="2"/>
<text x="57" y="420" fill="#8fc2da" font-size="12" text-anchor="middle" transform="rotate(-90 57 420)">THE CANAL</text>

<!-- KITCHEN -->
<rect x="80" y="100" width="220" height="150" fill="#221d17" stroke="#6b5a3c" stroke-width="3"/>
<text x="190" y="128" fill="#cdbf9a" font-size="14" text-anchor="middle">KITCHEN</text>
<text x="190" y="146" fill="#8a7a54" font-size="10.5" text-anchor="middle" font-style="italic">food cooking, warm</text>
<!-- canal window = the entry -->
<rect x="74" y="150" width="12" height="44" fill="#2a3a18" stroke="#7fb24a" stroke-width="2.5"/>
<text x="190" y="196" fill="#9fd06a" font-size="11" text-anchor="middle">canal window</text>
<text x="190" y="210" fill="#7fb24a" font-size="9.5" text-anchor="middle" font-style="italic">simple latch · Easy Agility (+2)</text>
<path d="M30 172 H72" fill="none" stroke="#7fb24a" stroke-width="3" marker-end="url(#arrow)"/>
<text x="30" y="160" fill="#9fd06a" font-size="11">ORION'S WAY IN</text>

<!-- CELLAR (off kitchen) -->
<rect x="80" y="262" width="140" height="96" fill="#0e0c09" stroke="#5a4c34" stroke-width="2"/>
<text x="150" y="300" fill="#9a8a64" font-size="12" text-anchor="middle">CELLAR</text>
<text x="150" y="316" fill="#7a6a54" font-size="9.5" text-anchor="middle" font-style="italic">pitch dark · Lucia's</text>
<text x="150" y="328" fill="#7a6a54" font-size="9.5" text-anchor="middle" font-style="italic">overnight punishment</text>

<!-- MAIN HALL -->
<rect x="80" y="370" width="480" height="180" fill="#241f18" stroke="#6b5a3c" stroke-width="3"/>
<text x="320" y="398" fill="#cdbf9a" font-size="15" text-anchor="middle">MAIN HALL</text>
<text x="320" y="416" fill="#8a7a54" font-size="10.5" text-anchor="middle" font-style="italic">fireplace · tables · the performance space</text>
<!-- fireplace -->
<rect x="96" y="430" width="54" height="22" fill="#3a1f14" stroke="#a8502f" stroke-width="2"/>
<text x="123" y="468" fill="#b87858" font-size="9.5" text-anchor="middle">hearth</text>
<!-- staircase up -->
<g>
  <rect x="470" y="384" width="74" height="150" fill="#1c1813" stroke="#c9b27a" stroke-width="2"/>
  <line x1="470" y1="404" x2="544" y2="404" stroke="#8a7654" stroke-width="1.5"/>
  <line x1="470" y1="424" x2="544" y2="424" stroke="#8a7654" stroke-width="1.5"/>
  <line x1="470" y1="444" x2="544" y2="444" stroke="#8a7654" stroke-width="1.5"/>
  <line x1="470" y1="464" x2="544" y2="464" stroke="#8a7654" stroke-width="1.5"/>
  <line x1="470" y1="484" x2="544" y2="484" stroke="#8a7654" stroke-width="1.5"/>
  <line x1="470" y1="504" x2="544" y2="504" stroke="#8a7654" stroke-width="1.5"/>
  <text x="507" y="528" fill="#cdbf9a" font-size="10.5" text-anchor="middle">STAIRS UP</text>
</g>
<!-- front door -->
<rect x="300" y="544" width="80" height="14" fill="#3a3128" stroke="#6b5a3c" stroke-width="2"/>
<text x="340" y="572" fill="#9a8a64" font-size="10.5" text-anchor="middle">FRONT DOOR (to street)</text>
<text x="340" y="585" fill="#7a6a54" font-size="9.5" text-anchor="middle" font-style="italic">barred at night · Hard Agility (-4) · opens onto the sleepers</text>

<!-- DORMITORY -->
<rect x="80" y="600" width="480" height="120" fill="#1f1b15" stroke="#7a6646" stroke-width="3"/>
<text x="320" y="623" fill="#cdbf9a" font-size="14" text-anchor="middle">DORMITORY — THE FIELD OF SLEEPERS (23 children)</text>
<!-- beds grid -->
<g fill="#2c2620" stroke="#5a4c34" stroke-width="1.5">
  <rect x="96" y="636" width="40" height="22"/><rect x="146" y="636" width="40" height="22"/>
  <rect x="196" y="636" width="40" height="22"/><rect x="246" y="636" width="40" height="22"/>
  <rect x="296" y="636" width="40" height="22"/><rect x="346" y="636" width="40" height="22"/>
  <rect x="396" y="636" width="40" height="22"/><rect x="446" y="636" width="40" height="22"/>
  <rect x="96" y="684" width="40" height="22"/><rect x="146" y="684" width="40" height="22"/>
  <rect x="196" y="684" width="40" height="22"/><rect x="246" y="684" width="40" height="22"/>
  <rect x="346" y="684" width="40" height="22"/><rect x="396" y="684" width="40" height="22"/>
  <rect x="446" y="684" width="40" height="22"/>
</g>
<!-- key sleepers + constance -->
<circle cx="116" cy="647" r="11" fill="#5a1f25" stroke="#c0504d" stroke-width="2"/><text x="116" y="651" fill="#f0d8d8" font-size="9" text-anchor="middle">S</text>
<circle cx="266" cy="695" r="11" fill="#2f4a6e" stroke="#6f9fd0" stroke-width="2"/><text x="266" y="699" fill="#dde8f5" font-size="9" text-anchor="middle">L</text>
<circle cx="466" cy="647" r="11" fill="#5a3a16" stroke="#c08a4c" stroke-width="2"/><text x="466" y="651" fill="#f0e3c8" font-size="9" text-anchor="middle">H</text>
<g>
  <rect x="300" y="678" width="44" height="34" fill="#5a4a1f" stroke="#e3b34c" stroke-width="2.5"/>
  <text x="322" y="699" fill="#fff" font-size="10" text-anchor="middle" font-weight="bold">CON</text>
</g>
<text x="322" y="640" fill="#e3b34c" font-size="9.5" text-anchor="middle" font-style="italic">Constance + Jon — roving, last awake; the patrol he can't remove</text>

<!-- ===================== UPPER FLOOR ===================== -->
<text x="640" y="86" fill="#b9a878" font-size="15" letter-spacing="2">UPPER FLOOR (private) — locked at night</text>
<!-- link from stairs -->
<path d="M547 459 C600 459 600 150 632 150" fill="none" stroke="#c9b27a" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.6"/>
<text x="600" y="300" fill="#9a8a64" font-size="10" text-anchor="middle" transform="rotate(-90 600 300)">staircase</text>

<!-- upstairs landing / door -->
<rect x="632" y="120" width="60" height="14" fill="#3a3128" stroke="#a8502f" stroke-width="2.5"/>
<text x="700" y="131" fill="#c08a6a" font-size="10.5">UPSTAIRS DOOR — locked at night (Hard Agility -4)</text>

<!-- GRELOD'S QUARTERS (target) -->
<rect x="632" y="150" width="300" height="220" fill="#2a1a1a" stroke="#c0504d" stroke-width="3"/>
<text x="782" y="178" fill="#e8a0a0" font-size="15" text-anchor="middle">GRELOD'S QUARTERS — THE TARGET</text>
<text x="782" y="196" fill="#c08080" font-size="10.5" text-anchor="middle" font-style="italic">ledger till midnight · LIGHT SLEEPER · the lightest sleeper in the house</text>
<!-- bed + grelod -->
<rect x="652" y="220" width="110" height="60" fill="#3a2424" stroke="#a8502f" stroke-width="2"/>
<circle cx="707" cy="250" r="15" fill="#7a1f25" stroke="#e35a5a" stroke-width="2.5"/><text x="707" y="255" fill="#fff" font-size="11" text-anchor="middle" font-weight="bold">G</text>
<text x="707" y="298" fill="#c08080" font-size="9.5" text-anchor="middle" font-style="italic">bed</text>
<!-- chest under bed -->
<rect x="664" y="262" width="30" height="14" fill="#1c140a" stroke="#c9b27a" stroke-width="1.5"/>
<text x="652" y="320" fill="#cdbf9a" font-size="9.5">chest under bed (Very Hard -6):</text>
<text x="652" y="333" fill="#8a7a54" font-size="9" font-style="italic">800g · Brynjolf letters · "graduated" children list</text>
<!-- desk + ledger -->
<rect x="838" y="220" width="74" height="44" fill="#2a241c" stroke="#8a7654" stroke-width="2"/>
<text x="875" y="246" fill="#cdbf9a" font-size="10" text-anchor="middle">DESK</text>
<text x="875" y="282" fill="#cdbf9a" font-size="9.5" text-anchor="middle">ledger — locked</text>
<text x="875" y="294" fill="#8a7a54" font-size="9" text-anchor="middle" font-style="italic">drawer (Hard -4)</text>

<!-- TRAINING ROOM (evidence) -->
<rect x="632" y="386" width="300" height="150" fill="#1a0f10" stroke="#7a3a3a" stroke-width="3"/>
<text x="782" y="412" fill="#d88a8a" font-size="14" text-anchor="middle">THE TRAINING ROOM — the evidence</text>
<text x="782" y="430" fill="#a86a6a" font-size="10.5" text-anchor="middle" font-style="italic">MASTER LOCK (Very Hard -6, or Grelod's key)</text>
<text x="782" y="456" fill="#b9a0a0" font-size="10" text-anchor="middle">bloody practice locks · daggers · sewer-map chalkboard</text>
<text x="782" y="472" fill="#b9a0a0" font-size="10" text-anchor="middle">stopwatch · the leather strap on its hook</text>
<text x="782" y="496" fill="#8a6a6a" font-size="9.5" text-anchor="middle" font-style="italic">smells of fear-sweat. Expose this = public disgrace.</text>

<!-- STORAGE (decoy) -->
<rect x="632" y="552" width="300" height="86" fill="#1c1813" stroke="#5a4c34" stroke-width="2"/>
<text x="782" y="582" fill="#9a8a64" font-size="13" text-anchor="middle">STORAGE — genuine (the decoy)</text>
<text x="782" y="600" fill="#7a6a54" font-size="9.5" text-anchor="middle" font-style="italic">blankets, food. "An old woman's clutter." Nothing sinister.</text>

<!-- ===================== LEGEND ===================== -->
<rect x="968" y="150" width="200" height="300" fill="#1a1610" stroke="#5a4c34" stroke-width="1.5"/>
<text x="980" y="174" fill="#d8c79a" font-size="13" letter-spacing="1">LEGEND</text>
<circle cx="990" cy="196" r="9" fill="#7a1f25" stroke="#e35a5a" stroke-width="2"/><text x="1008" y="200" fill="#c9b8a0" font-size="11">G — Grelod (target)</text>
<rect x="982" y="214" width="16" height="13" fill="#5a4a1f" stroke="#e3b34c" stroke-width="2"/><text x="1008" y="225" fill="#c9b8a0" font-size="11">CON — Constance + Jon</text>
<circle cx="990" cy="244" r="9" fill="#5a1f25" stroke="#c0504d" stroke-width="2"/><text x="1008" y="248" fill="#c9b8a0" font-size="11">S — Samuel (spy: reports</text>
<text x="1008" y="262" fill="#9a8a7a" font-size="10">to Grelod — worst draw)</text>
<circle cx="990" cy="280" r="9" fill="#2f4a6e" stroke="#6f9fd0" stroke-width="2"/><text x="1008" y="284" fill="#c9b8a0" font-size="11">L — Lucia (panics in dark)</text>
<circle cx="990" cy="306" r="9" fill="#5a3a16" stroke="#c08a4c" stroke-width="2"/><text x="1008" y="310" fill="#c9b8a0" font-size="11">H — Hroar (broken; watches)</text>
<rect x="982" y="324" width="16" height="13" fill="#2c2620" stroke="#5a4c34" stroke-width="1.5"/><text x="1008" y="335" fill="#c9b8a0" font-size="11">child's bed (a fuse)</text>
<rect x="982" y="346" width="16" height="13" fill="#2a3a18" stroke="#7fb24a" stroke-width="2"/><text x="1008" y="357" fill="#c9b8a0" font-size="11">window entry (Orion's way)</text>
<rect x="982" y="368" width="16" height="13" fill="#3a3128" stroke="#a8502f" stroke-width="2"/><text x="1008" y="379" fill="#c9b8a0" font-size="11">locked door (difficulty noted)</text>
<text x="980" y="404" fill="#8a7a54" font-size="10" font-style="italic">EXPOSURE LADDER:</text>
<text x="980" y="420" fill="#9a8a7a" font-size="9.5">calm → stirring → roused →</text>
<text x="980" y="433" fill="#c0504d" font-size="9.5">EXPOSED (does not reset).</text>
<text x="980" y="446" fill="#8a7a54" font-size="9.5" font-style="italic">Samuel→Grelod = +2 rungs.</text>

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
    <path d="M0 0 L8 3 L0 6 z" fill="#7fb24a"/>
  </marker>
</defs>
</svg>
